<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - 模型映射</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#FAF9F5 }
    .page-hd { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px }
    .page-title { font-size:22px; font-weight:700; line-height:1.2 }
    .page-actions { display:flex; gap:8px; align-items:center }
    .mapping-card { background:#fff; border:1px solid #e8e3d8; border-radius:18px; overflow:hidden; box-shadow:0 10px 30px rgba(21,18,14,.05) }
    .mapping-form { display:grid }
    .alias-row { display:grid; grid-template-columns:112px minmax(0,1fr); gap:18px; align-items:start; padding:18px 20px; border-bottom:1px solid #eee7dc; background:linear-gradient(180deg,#fff,#fffdf9) }
    .alias-row:last-child { border-bottom:none }
    .alias-name { display:grid; align-content:center; justify-items:center; gap:2px; min-height:46px; border-radius:14px; background:#111; color:#fff; -webkit-text-fill-color:#fff; font-weight:850; letter-spacing:.06em; box-shadow:inset 0 -1px 0 rgba(255,255,255,.16), 0 8px 18px rgba(17,17,17,.08) }
    .alias-name small { font-size:10px; font-weight:650; letter-spacing:0; opacity:.68 }
    .model-picker { display:grid; gap:10px; min-width:0 }
    .model-options { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:8px }
    .model-option { display:flex; align-items:flex-start; gap:8px; min-width:0; padding:10px; border:1px solid #e5ded2; border-radius:12px; background:#fff; cursor:pointer }
    .model-option:hover { border-color:#cfc5b6; background:#fffdf8 }
    .model-option input { margin-top:3px; flex:0 0 auto }
    .model-text { min-width:0; display:grid; gap:3px }
    .model-id { font-size:12px; font-weight:750; color:#111; overflow-wrap:anywhere }
    .model-meta { font-size:11px; color:#777 }
    .model-actions { display:grid; grid-template-columns:minmax(260px,520px) auto; align-items:center; gap:8px }
    .model-actions select { width:100%; height:36px; min-width:0; border:1px solid #d8d2c7; border-radius:11px; background:#fff; padding:0 11px; font:inherit; box-shadow:inset 0 1px 0 rgba(255,255,255,.6) }
    .model-actions select:focus { border-color:#111; box-shadow:0 0 0 3px rgba(17,17,17,.06) }
    .ordered-list { display:flex; flex-wrap:wrap; gap:8px; min-height:32px; align-items:center }
    .ordered-item { display:inline-flex; align-items:center; gap:7px; max-width:100%; min-height:30px; padding:0 7px 0 10px; border:1px solid #e6dccd; border-radius:999px; background:#f6f0e7; color:#181511; font-size:12px; font-weight:700; box-shadow:0 1px 0 rgba(255,255,255,.72) }
    .ordered-text { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .ordered-item button { flex:0 0 auto; width:18px; height:18px; border-radius:999px; border:1px solid #d9cfbf; background:#e9dfd0; color:#171411; cursor:pointer; line-height:16px; font-weight:800 }
    .ordered-item button:hover { background:#111; border-color:#111; color:#fff; -webkit-text-fill-color:#fff }
    .muted { display:inline-flex; align-items:center; height:30px; color:#8a8174; font-size:12px }
    .status { display:inline-flex; align-items:center; height:28px; padding:0 10px; border:1px solid #eee7dc; border-radius:999px; background:#fffdf9; font-size:12px; color:#766d60; white-space:nowrap }
    .btn-line { height:36px; padding:0 13px; border:1px solid #d8d2c7; border-radius:11px; background:#fff; color:#222; font-weight:700; box-shadow:0 1px 0 rgba(255,255,255,.8) }
    .btn-line:hover { border-color:#111; background:#fffdf8 }
    .btn-line:disabled { opacity:.45; pointer-events:none }
    .btn-primary { height:36px; padding:0 15px; border-radius:11px; background:#111; color:#fff !important; -webkit-text-fill-color:#fff; border:1px solid #111; font-weight:750; box-shadow:0 8px 18px rgba(17,17,17,.08) }
    .btn-primary:hover:not(:disabled) { opacity:.9 }
    .btn-primary:disabled { opacity:.45; pointer-events:none }
    @media (max-width: 760px) {
      .page-hd { align-items:flex-start; flex-direction:column }
      .page-actions { width:100%; flex-wrap:wrap }
      .alias-row { grid-template-columns:1fr }
      .alias-name { justify-content:flex-start; padding:0 12px }
      .model-actions { grid-template-columns:1fr }
      .model-options { grid-template-columns:1fr }
    }
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/model-mapping"></div>

<main class="admin-main" style="padding-bottom:60px">
  <div class="page-hd">
    <div class="page-title">模型映射</div>
    <div class="page-actions">
      <span class="status" id="status">加载中…</span>
      <button class="btn-line" id="reset-btn" type="button" disabled>重置</button>
      <button class="btn-primary" id="save-btn" type="button" disabled>保存</button>
    </div>
  </div>

  <section class="mapping-card">
    <div class="mapping-form" id="mapping-form"></div>
  </section>
</main>

<div id="site-footer"></div>

<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
const VIRTUAL_MODELS = ['FREE', 'SUPER'];
let adminAuthKey = '';
let allModels = [];
let savedAliases = {};
let draftAliases = {};

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (adminAuthKey) headers.Authorization = `Bearer ${adminAuthKey}`;
  const res = await fetch(`${ADMIN_API}${path}`, { ...options, headers, cache:'no-store' });
  const text = await res.text();
  let body = null;
  try { body = text ? JSON.parse(text) : null; } catch { body = text; }
  if (!res.ok) {
    const message = typeof body === 'string' ? body : (body?.detail || body?.error?.message || res.statusText);
    throw new Error(message);
  }
  return body;
}

function normalizeAliases(value) {
  const source = value && typeof value === 'object' ? value : {};
  const result = {};
  VIRTUAL_MODELS.forEach((name) => {
    const items = Array.isArray(source[name]) ? source[name] : [];
    result[name] = [...new Set(items.map((item) => String(item || '').trim()).filter(Boolean))];
  });
  return result;
}

function sameAliases(a, b) {
  return JSON.stringify(normalizeAliases(a)) === JSON.stringify(normalizeAliases(b));
}

function modelLabel(item) {
  const flags = [];
  if (item.chat) flags.push('chat');
  if (item.console) flags.push('console');
  if (item.image) flags.push('image');
  if (item.image_edit) flags.push('edit');
  if (item.video) flags.push('video');
  return `${item.pool}${flags.length ? ' · ' + flags.join(' · ') : ''}`;
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function syncButtons() {
  const dirty = !sameAliases(savedAliases, draftAliases);
  document.getElementById('save-btn').disabled = !dirty;
  document.getElementById('reset-btn').disabled = !dirty;
  setStatus(dirty ? '存在未保存更改' : '已保存');
}

function removeCandidate(aliasName, modelId) {
  draftAliases[aliasName] = (draftAliases[aliasName] || []).filter((item) => item !== modelId);
  render();
}

function addCandidate(aliasName) {
  const select = document.getElementById(`select-${aliasName}`);
  const modelId = select.value;
  if (!modelId) return;
  const items = draftAliases[aliasName] || [];
  if (!items.includes(modelId)) items.push(modelId);
  draftAliases[aliasName] = items;
  select.value = '';
  render();
}

function renderAlias(aliasName) {
  const selected = draftAliases[aliasName] || [];
  const selectedSet = new Set(selected);
  const selectedHtml = selected.length
    ? selected.map((modelId) => `<span class="ordered-item"><span class="ordered-text">${esc(modelId)}</span><button type="button" aria-label="移除 ${esc(modelId)}" onclick="removeCandidate('${esc(aliasName)}','${esc(modelId)}')">×</button></span>`).join('')
    : '<span class="muted">未配置候选模型</span>';
  const options = allModels
    .filter((item) => !selectedSet.has(item.id))
    .map((item) => `<option value="${esc(item.id)}">${esc(item.id)} · ${esc(modelLabel(item))}</option>`)
    .join('');
  return `
    <div class="alias-row">
      <div class="alias-name">${esc(aliasName)}<small>${selected.length} 个模型</small></div>
      <div class="model-picker">
        <div class="ordered-list">${selectedHtml}</div>
        <div class="model-actions">
          <select id="select-${esc(aliasName)}">
            <option value="">选择真实模型</option>
            ${options}
          </select>
          <button class="btn-line" type="button" onclick="addCandidate('${esc(aliasName)}')">添加</button>
        </div>
      </div>
    </div>`;
}

function render() {
  document.getElementById('mapping-form').innerHTML = VIRTUAL_MODELS.map(renderAlias).join('');
  syncButtons();
}

async function loadMapping() {
  setStatus('加载中…');
  const payload = await apiFetch('/model-mapping');
  allModels = payload?.data?.models || [];
  savedAliases = normalizeAliases(payload?.data?.aliases);
  draftAliases = normalizeAliases(savedAliases);
  render();
}

async function saveMapping() {
  const aliases = normalizeAliases(draftAliases);
  setStatus('保存中…');
  await apiFetch('/model-mapping', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({ models:{ aliases } }),
  });
  savedAliases = normalizeAliases(aliases);
  draftAliases = normalizeAliases(aliases);
  render();
  window.showToast?.('模型映射已保存', 'success');
}

function waitI18n() {
  return new Promise((resolve) => window.I18n?.onReady(resolve) || resolve());
}

(async () => {
  await waitI18n();
  await window.renderAdminHeader?.();
  await window.renderSiteFooter?.();
  adminAuthKey = await adminKey.get();
  if (!adminAuthKey || !await verifyKey(ADMIN_API + '/verify', adminAuthKey).catch(() => false)) {
    location.href = '/admin/login';
    return;
  }
  document.getElementById('save-btn').addEventListener('click', () => saveMapping().catch((error) => {
    setStatus('保存失败');
    window.showToast?.(`保存失败: ${error.message}`, 'error');
  }));
  document.getElementById('reset-btn').addEventListener('click', () => {
    draftAliases = normalizeAliases(savedAliases);
    render();
  });
  try {
    await loadMapping();
  } catch (error) {
    setStatus('加载失败');
    document.getElementById('mapping-form').innerHTML = `<span class="muted">${esc(error.message)}</span>`;
    window.showToast?.('模型映射加载失败', 'error');
  }
})();
</script>
</body>
</html>
