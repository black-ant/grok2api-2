<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Grok 能力检测</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#FAF9F5 }
    .page-hd { display:flex; align-items:center; gap:12px; margin-bottom:16px }
    .page-title { font-size:22px; font-weight:700; line-height:1.2 }
    .cap-status { margin-left:auto; font-size:12px; color:#777; white-space:nowrap }
    .cap-card { width:100%; max-width:none; box-sizing:border-box; background:#fff; border:1px solid #e8e3d8; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(15,23,42,.04) }
    .cap-form { display:grid; grid-template-columns:1fr; gap:14px }
    .field { display:grid; gap:6px; min-width:0 }
    .field label { font-size:12px; font-weight:800; color:#222 }
    .field select { width:100%; height:40px; padding:0 10px; border:1px solid #d8d2c7; border-radius:10px; background:#fff; color:#111; font:inherit; box-sizing:border-box }
    .key-picker { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; align-items:center }
    .key-display { min-height:40px; display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid #d8d2c7; border-radius:10px; background:#fff; box-sizing:border-box; min-width:0; overflow:hidden }
    .key-email { min-width:0; font-size:13px; font-weight:800; color:#111; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .key-meta { flex:0 0 auto; font-size:11px; color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace }
    .key-picker .btn { height:40px; min-width:104px; padding:0 14px; border-radius:10px; border:1px solid #d8d2c7; background:#fff; color:#111; font-weight:700; box-shadow:inset 0 1px 0 rgba(255,255,255,.8) }
    .key-picker .btn:hover { background:#fffdf8; border-color:#111 }
    .cap-actions { display:flex; align-items:center; gap:8px; padding-top:2px; flex-wrap:wrap }
    .cap-actions .btn { min-width:104px }
    .cap-actions .cap-status { margin-left:auto }
    .scan-result-card { margin-top:14px; border-top:1px solid #eee8df; padding-top:14px; display:grid; gap:12px }
    .scan-result-head { display:flex; align-items:center; justify-content:space-between; gap:10px }
    .scan-result-title { font-size:14px; font-weight:850; color:#111 }
    .scan-result-meta { margin-top:3px; font-size:12px; color:#666; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace }
    .scan-result-pill { display:inline-flex; align-items:center; height:26px; padding:0 10px; border-radius:999px; font-size:12px; font-weight:800; white-space:nowrap }
    .scan-result-pill.is-pass { background:#dcfce7; color:#15803d }
    .scan-result-pill.is-fail { background:#ffedd5; color:#c2410c }
    .scan-result-grid { display:grid; grid-template-columns:1.4fr .7fr .7fr .7fr; gap:10px }
    .scan-result-item { min-width:0; border:1px solid #ebe5dc; border-radius:12px; padding:10px 12px; background:#fffdf9 }
    .scan-result-label { font-size:11px; color:#777; margin-bottom:5px }
    .scan-result-value { min-width:0; font-size:13px; font-weight:750; color:#111; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .scan-result-block { border:1px solid #ebe5dc; border-radius:12px; padding:10px 12px; background:#fff }
    .scan-result-text { font-size:13px; color:#222; white-space:pre-wrap; overflow-wrap:anywhere }
    .scan-result-text.mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12px }
    .account-modal { width:min(760px,94vw) }
    .account-filters { display:grid; grid-template-columns:minmax(0,1fr) 150px; gap:8px; margin-bottom:10px }
    .account-filters .input,
    .account-filters select { width:100%; height:36px; border:1px solid #d8d2c7; border-radius:10px; background:#fff; color:#111; font:inherit; font-size:12px; box-sizing:border-box }
    .account-filters .input { padding:0 10px }
    .account-filters select { padding:0 8px }
    .account-table { max-height:58vh; overflow:auto; border:1px solid #e6dfd4; border-radius:12px; background:#fff }
    .account-table-head,
    .account-row { display:grid; grid-template-columns:minmax(0,1.5fr) minmax(150px,.7fr); gap:12px; align-items:center }
    .account-table-head { position:sticky; top:0; z-index:1; padding:9px 12px; border-bottom:1px solid #eee8df; background:#fbfaf7; color:#777; font-size:11px; font-weight:800 }
    .account-list { display:grid }
    .account-row { width:100%; padding:10px 12px; border:0; border-bottom:1px solid #f0ebe4; background:#fff; cursor:pointer; text-align:left }
    .account-row:last-child { border-bottom:0 }
    .account-row:hover { background:#fffdf8 }
    .account-row.is-active { background:#faf7ef; box-shadow:inset 3px 0 0 #111 }
    .account-main,
    .account-side { min-width:0; display:grid; gap:4px }
    .account-email { font-size:13px; font-weight:800; color:#111; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .account-meta { font-size:11px; color:#666; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .account-badge { justify-self:start; display:inline-flex; align-items:center; height:24px; padding:0 9px; border-radius:999px; background:#f3f4f6; color:#374151; font-size:11px; font-weight:750; white-space:nowrap }
    .account-status { font-size:11px; color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    #batch-modal { padding:16px; overflow-y:auto }
    .batch-modal { width:min(880px,94vw); max-height:calc(100dvh - 32px); display:flex; flex-direction:column; overflow:hidden }
    .batch-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px }
    .batch-head .modal-title { margin-bottom:0 }
    .batch-picks { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px }
    .batch-status { font-size:12px; color:#666; margin-bottom:10px }
    .batch-list { flex:1 1 0; min-height:0; overflow:auto; display:grid; gap:8px }
    .batch-row { display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:10px; padding:10px 12px; border:1px solid #e6dfd4; border-radius:12px; background:#fff }
    .batch-row.is-selected { border-color:#111 }
    .batch-row.is-running { border-color:#111; background:#fafafa }
    .batch-row.is-pass { border-color:#86efac; background:#ecfdf3 }
    .batch-row.is-fail { border-color:#fed7aa; background:#fff7ed }
    .batch-name { min-width:0; font-size:13px; font-weight:750; color:#111; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .batch-meta { margin-top:4px; font-size:11px; color:#666; font-weight:500 }
    .batch-pill { display:inline-flex; align-items:center; height:24px; padding:0 9px; border-radius:999px; font-size:11px; font-weight:750; background:#f3f4f6; color:#374151; white-space:nowrap }
    .batch-pill.is-pass { background:#dcfce7; color:#15803d }
    .batch-pill.is-fail { background:#ffedd5; color:#c2410c }
    .batch-pill.is-running { background:#111; color:#fff }
    .batch-results { margin-top:12px; flex:1 1 0; min-height:0; overflow:auto }
    .batch-result-table { width:100%; border:1px solid #e6dfd4; border-radius:12px; border-spacing:0; overflow:hidden; background:#fff; font-size:12px }
    .batch-result-table th, .batch-result-table td { padding:9px 10px; border-bottom:1px solid #efe8dd; text-align:left; vertical-align:middle }
    .batch-result-table th { background:#faf9f5; color:#555; font-weight:800 }
    .batch-result-table thead th { position:sticky; top:0; z-index:1 }
    .batch-result-table tr:last-child td { border-bottom:0 }
    .batch-result-table tr.is-pass { background:#ecfdf3 }
    .batch-result-table tr.is-fail { background:#fff7ed }
    .result-model { max-width:300px; font-weight:750; color:#111; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .result-meta { margin-top:3px; color:#666; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .result-actions { display:flex; justify-content:flex-end; gap:6px; white-space:nowrap }
    @media (max-width: 760px) {
      .page-hd { align-items:flex-start; flex-direction:column }
      .cap-form { grid-template-columns:1fr }
      .cap-actions { flex-wrap:wrap }
      .cap-actions .cap-status { width:100%; margin-left:0 }
      .scan-result-head { align-items:flex-start; flex-direction:column }
      .scan-result-grid { grid-template-columns:repeat(2,minmax(0,1fr)) }
      #batch-modal { padding:12px }
      .batch-modal { max-height:calc(100dvh - 24px) }
      .batch-row { grid-template-columns:auto minmax(0,1fr); align-items:start }
      .batch-pill { grid-column:2 }
      .batch-result-table { display:block; overflow-x:auto }
    }
  </style>
</head>
<body>

<div id="admin-header" data-active="/admin/grok-capability"></div>

<main class="admin-main" style="padding-bottom:60px">
  <div class="page-hd">
    <div class="page-title">Grok 能力检测</div>
  </div>

  <section class="cap-card">
    <form class="cap-form" id="cap-form">
      <div class="field">
        <label>Key</label>
        <div class="key-picker">
          <div class="key-display" id="key-display">
            <div class="key-email">加载中…</div>
            <div class="key-meta">—</div>
          </div>
          <button type="button" class="btn btn-ghost" id="open-account-btn" disabled>选择 Key</button>
        </div>
      </div>

      <div class="field">
        <label for="model-select">模型</label>
        <select id="model-select" required disabled>
          <option value="">加载中…</option>
        </select>
      </div>

      <div class="cap-actions">
        <button type="submit" class="btn btn-primary" id="scan-btn" disabled>开始检测</button>
        <button type="button" class="btn btn-ghost" id="open-batch-btn" disabled>批量检测</button>
        <button type="button" class="btn btn-ghost" id="reload-btn">重新加载</button>
        <span class="cap-status" id="cap-status">加载中…</span>
      </div>
    </form>
    <section class="scan-result-card" id="scan-result-card" hidden>
      <div class="scan-result-head">
        <div>
          <div class="scan-result-title" id="scan-result-title">检测结果</div>
          <div class="scan-result-meta" id="scan-result-meta">—</div>
        </div>
        <span class="scan-result-pill" id="scan-result-pill">—</span>
      </div>
      <div class="scan-result-grid">
        <div class="scan-result-item">
          <div class="scan-result-label">账号</div>
          <div class="scan-result-value" id="scan-result-token">—</div>
        </div>
        <div class="scan-result-item">
          <div class="scan-result-label">模型</div>
          <div class="scan-result-value" id="scan-result-model">—</div>
        </div>
        <div class="scan-result-item">
          <div class="scan-result-label">耗时</div>
          <div class="scan-result-value" id="scan-result-duration">—</div>
        </div>
        <div class="scan-result-item">
          <div class="scan-result-label">状态</div>
          <div class="scan-result-value" id="scan-result-status">—</div>
        </div>
      </div>
      <div class="scan-result-block">
        <div class="scan-result-label">问题</div>
        <div class="scan-result-text" id="scan-result-question">—</div>
      </div>
      <div class="scan-result-block">
        <div class="scan-result-label">返回</div>
        <div class="scan-result-text mono" id="scan-result-body">—</div>
      </div>
    </section>
  </section>
</main>

<div class="modal-overlay" id="account-modal" aria-hidden="true">
  <div class="modal account-modal" role="dialog" aria-modal="true" aria-labelledby="account-modal-title">
    <div class="batch-head">
      <div class="modal-title" id="account-modal-title">选择 Key</div>
      <button type="button" class="btn btn-ghost btn-sm" data-account-close>关闭</button>
    </div>
    <div class="account-filters">
      <input id="account-email-filter" class="input" type="search" placeholder="筛选邮箱">
      <select id="account-pool-filter" aria-label="筛选类型"></select>
    </div>
    <div class="account-table">
      <div class="account-table-head">
        <span>邮箱 / Key</span>
        <span>类型 / 状态</span>
      </div>
      <div class="account-list" id="account-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="batch-modal" aria-hidden="true">
  <div class="modal batch-modal" role="dialog" aria-modal="true" aria-labelledby="batch-modal-title">
    <div class="batch-head">
      <div class="modal-title" id="batch-modal-title">批量检测</div>
      <button type="button" class="btn btn-ghost btn-sm" data-batch-close>关闭</button>
    </div>
    <div class="batch-picks">
      <button type="button" class="btn btn-ghost btn-sm" id="select-all-batch-btn">全选</button>
      <button type="button" class="btn btn-ghost btn-sm" id="invert-batch-btn">全部反选</button>
      <button type="button" class="btn btn-ghost btn-sm" id="clear-batch-btn">清空</button>
    </div>
    <div class="batch-status" id="batch-status">选择模型后开始。</div>
    <div class="batch-list" id="batch-model-list"></div>
    <div class="batch-results" id="batch-results" hidden></div>
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" id="batch-report-btn" hidden>查看报告</button>
      <button type="button" class="btn btn-primary" id="start-batch-btn">开始批量</button>
    </div>
  </div>
</div>

<script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
let adminAuthKey = '';
let accounts = [];
let models = [];
let selectedAccountId = '';
let batchSelection = new Set();
let batchResults = [];
let batchRunning = false;
let accountEmailFilter = '';
let accountPoolFilter = '';
const VIRTUAL_MODEL_ALIASES = ['FREE', 'SUPER'];
let aliasCache = { FREE: [], SUPER: [] };
let aliasCacheLoaded = false;

function esc(value) {
  return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setStatus(text) {
  document.getElementById('cap-status').textContent = text;
}

function accountPrimaryLabel(account) {
  return account?.email || account?.token_mask || account?.id || '';
}

function accountMetaLabel(account) {
  if (!account) return '';
  return [account.email ? account.token_mask || account.id : '', account.pool || 'basic', account.status || '']
    .filter(Boolean)
    .join(' · ');
}

function accountTokenLabel(account) {
  return account?.token_mask || account?.id || '—';
}

function filteredAccounts() {
  const emailFilter = accountEmailFilter.trim().toLowerCase();
  const poolFilter = accountPoolFilter.trim().toLowerCase();
  return accounts.filter((item) => {
    const email = String(item.email || '').toLowerCase();
    const primary = String(accountPrimaryLabel(item)).toLowerCase();
    const pool = String(item.pool || 'basic').toLowerCase();
    return (!emailFilter || email.includes(emailFilter) || primary.includes(emailFilter))
      && (!poolFilter || pool === poolFilter);
  });
}

function renderAccountPoolFilter() {
  const select = document.getElementById('account-pool-filter');
  if (!select) return;
  const pools = [...new Set(accounts.map((item) => String(item.pool || 'basic').trim()).filter(Boolean))].sort();
  if (accountPoolFilter && !pools.includes(accountPoolFilter)) accountPoolFilter = '';
  select.innerHTML = '<option value="">全部类型</option>'
    + pools.map((pool) => `<option value="${esc(pool)}" ${pool === accountPoolFilter ? 'selected' : ''}>${esc(pool)}</option>`).join('');
}

function fmtTime(value) {
  if (!value) return '—';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? '—' : date.toLocaleString();
}

function statusLabel(status) {
  const labels = {
    available: '可用',
    unauthorized: '鉴权失败',
    forbidden: '禁止访问',
    rate_limited: '限流/配额',
    unavailable: '不可用',
    unknown: '未知',
  };
  return labels[status] || status || '未知';
}

function resultMessage(item) {
  if (item.status === 'available') return item.response_preview || 'OK';
  const parts = [];
  if (item.message) parts.push(item.message);
  if (item.body_preview) parts.push(item.body_preview);
  return parts.join(' · ') || '—';
}

function renderScanResult(report) {
  const card = document.getElementById('scan-result-card');
  if (!card) return;
  if (!report || !Array.isArray(report.results) || !report.results.length) {
    card.hidden = true;
    return;
  }

  const item = report.results[0];
  const account = accounts.find((entry) => entry.id === selectedAccountId) || null;
  const summary = report.summary || {};
  const total = Number(summary.total ?? report.results.length ?? 0);
  const isPass = item.status === 'available';

  card.hidden = false;
  document.getElementById('scan-result-title').textContent = '检测结果';
  document.getElementById('scan-result-meta').textContent = `${fmtTime(report.started_at)} · ${report.duration_ms || 0} ms`;

  const pill = document.getElementById('scan-result-pill');
  pill.textContent = statusLabel(item.status);
  pill.className = `scan-result-pill ${isPass ? 'is-pass' : 'is-fail'}`;

  document.getElementById('scan-result-token').textContent = accountPrimaryLabel(account) || report.token?.label || '—';
  document.getElementById('scan-result-model').textContent = `${item.name || item.id || '—'} · ${item.id || '—'}`;
  document.getElementById('scan-result-duration').textContent = `${item.duration_ms || report.duration_ms || 0} ms`;
  document.getElementById('scan-result-status').textContent = total > 1 ? `${summary.available || 0}/${total} 通过` : statusLabel(item.status);
  document.getElementById('scan-result-question').textContent = report.question || item.question || '—';
  document.getElementById('scan-result-body').textContent = resultMessage(item);
}

function normalizeAliases(value) {
  const source = value && typeof value === 'object' ? value : {};
  const result = {};
  VIRTUAL_MODEL_ALIASES.forEach((name) => {
    const items = Array.isArray(source[name]) ? source[name] : [];
    result[name] = [...new Set(items.map((item) => String(item || '').trim()).filter(Boolean))];
  });
  return result;
}

async function apiFetch(path, options = {}) {
  const headers = { Authorization: `Bearer ${adminAuthKey}`, ...(options.headers || {}) };
  const res = await fetch(`${ADMIN_API}${path}`, { ...options, headers, cache: 'no-store' });
  const text = await res.text();
  let body = null;
  try { body = text ? JSON.parse(text) : null; } catch { body = text; }
  if (!res.ok) {
    const message = typeof body === 'string' ? body : (body?.detail || body?.error?.message || res.statusText);
    const error = new Error(message);
    error.status = res.status;
    error.body = body;
    throw error;
  }
  return body;
}

function renderAccounts() {
  if (!selectedAccountId && accounts.length) selectedAccountId = accounts[0].id;
  if (selectedAccountId && !accounts.some((item) => item.id === selectedAccountId)) {
    selectedAccountId = accounts[0]?.id || '';
  }
  const account = accounts.find((item) => item.id === selectedAccountId);
  const display = document.getElementById('key-display');
  display.innerHTML = account
    ? `<div class="key-email">${esc(accountPrimaryLabel(account))}</div><div class="key-meta">${esc(accountMetaLabel(account))}</div>`
    : '<div class="key-email">无账号</div><div class="key-meta">—</div>';
  document.getElementById('open-account-btn').disabled = !accounts.length;
  document.getElementById('scan-btn').disabled = !selectedAccountId || !models.length;
  document.getElementById('open-batch-btn').disabled = !selectedAccountId || !models.length;
  renderAccountList();
}

function renderModels() {
  const select = document.getElementById('model-select');
  select.innerHTML = models.length
    ? models.map((item) => `<option value="${esc(item.id)}">${esc(item.name || item.id)} · ${esc(item.id)} · ${esc(item.kind || 'chat')}</option>`).join('')
    : '<option value="">无模型</option>';
  select.disabled = !models.length;
  document.getElementById('scan-btn').disabled = !selectedAccountId || !models.length;
  document.getElementById('open-batch-btn').disabled = !selectedAccountId || !models.length;
  renderBatchModels();
}

function renderAccountList() {
  const list = document.getElementById('account-list');
  if (!list) return;
  const items = filteredAccounts();
  list.innerHTML = items.map((item) => `
    <button type="button" class="account-row ${item.id === selectedAccountId ? 'is-active' : ''}" data-account-id="${esc(item.id)}">
      <span class="account-main">
        <span class="account-email">${esc(item.email || item.token_mask || item.id)}</span>
        <span class="account-meta">${esc(accountTokenLabel(item))}</span>
      </span>
      <span class="account-side">
        <span class="account-badge">${esc(item.pool || 'basic')}</span>
        <span class="account-status">${esc(item.status || '—')}</span>
      </span>
    </button>
  `).join('') || '<div class="batch-status" style="padding:12px;margin:0">无匹配账号</div>';
  list.querySelectorAll('[data-account-id]').forEach((node) => {
    node.addEventListener('click', () => {
      selectedAccountId = node.dataset.accountId || '';
      renderAccounts();
      closeAccountModal();
    });
  });
}

function openAccountModal() {
  renderAccountPoolFilter();
  renderAccountList();
  const modal = document.getElementById('account-modal');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  setTimeout(() => document.getElementById('account-email-filter')?.focus(), 0);
}

function closeAccountModal() {
  const modal = document.getElementById('account-modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

function batchItemStatus(modelId) {
  return batchResults.find((item) => item.id === modelId)?.status || 'pending';
}

function batchStatusLabel(status) {
  if (status === 'available') return '通过';
  if (status === 'running') return '检测中';
  if (status === 'pending') return '待检测';
  return '未通过';
}

function batchRowClass(status, selected) {
  const classes = ['batch-row'];
  if (selected) classes.push('is-selected');
  if (status === 'available') classes.push('is-pass');
  else if (status === 'running') classes.push('is-running');
  else if (status !== 'pending') classes.push('is-fail');
  return classes.join(' ');
}

function batchPillClass(status) {
  if (status === 'available') return 'batch-pill is-pass';
  if (status === 'running') return 'batch-pill is-running';
  if (status === 'pending') return 'batch-pill';
  return 'batch-pill is-fail';
}

function updateBatchStatus() {
  const selectedCount = batchSelection.size;
  const passCount = batchResults.filter((item) => item.status === 'available').length;
  const doneCount = batchResults.length;
  const text = batchRunning
    ? `检测中：${doneCount} / ${selectedCount}，通过 ${passCount}`
    : `已选择 ${selectedCount} 个模型，通过 ${passCount}`;
  document.getElementById('batch-status').textContent = text;
  document.getElementById('start-batch-btn').disabled = batchRunning || !selectedCount;
  document.getElementById('select-all-batch-btn').disabled = batchRunning || !models.length;
  document.getElementById('invert-batch-btn').disabled = batchRunning || !models.length;
  document.getElementById('clear-batch-btn').disabled = batchRunning || !selectedCount;
  document.getElementById('batch-report-btn').hidden = !batchResults.length;
  renderBatchResults();
}

function renderBatchModels(runningModelId = '') {
  const list = document.getElementById('batch-model-list');
  if (!list) return;
  list.innerHTML = models.map((item) => {
    const selected = batchSelection.has(item.id);
    const status = runningModelId === item.id ? 'running' : batchItemStatus(item.id);
    return `
      <label class="${batchRowClass(status, selected)}">
        <input type="checkbox" value="${esc(item.id)}" ${selected ? 'checked' : ''} ${batchRunning ? 'disabled' : ''}>
        <span class="batch-name" title="${esc(item.id)}">
          ${esc(item.name || item.id)}
          <span class="batch-meta">${esc(item.id)} · ${esc(item.kind || 'chat')} · ${esc(item.pool || 'default')}</span>
        </span>
        <span class="${batchPillClass(status)}">${esc(batchStatusLabel(status))}</span>
      </label>`;
  }).join('') || '<div class="batch-status">无模型</div>';
  list.querySelectorAll('input[type="checkbox"]').forEach((input) => {
    input.addEventListener('change', (event) => {
      const modelId = event.target.value;
      if (event.target.checked) batchSelection.add(modelId);
      else batchSelection.delete(modelId);
      updateBatchStatus();
      renderBatchModels();
    });
  });
  updateBatchStatus();
}

function batchResultText(item) {
  const parts = [];
  if (item.http_status) parts.push(`HTTP ${item.http_status}`);
  if (item.duration_ms) parts.push(`${Math.round(Number(item.duration_ms))}ms`);
  if (item.message && item.message !== 'OK') parts.push(item.message);
  return parts.join(' · ') || 'OK';
}

function aliasHasModel(aliasName, modelId) {
  return aliasCacheLoaded && (aliasCache[aliasName] || []).includes(modelId);
}

function renderBatchResults() {
  const container = document.getElementById('batch-results');
  if (!container) return;
  if (batchRunning || !batchResults.length) {
    container.hidden = true;
    container.innerHTML = '';
    return;
  }
  const rows = batchResults.map((item) => {
    const model = models.find((modelItem) => modelItem.id === item.id) || {};
    const status = item.status || 'unknown';
    const canAdd = status === 'available';
    const modelName = item.name || model.name || item.id;
    const kind = item.kind || model.kind || 'chat';
    const pool = item.pool || model.pool || 'default';
    const freeAdded = aliasHasModel('FREE', item.id);
    const superAdded = aliasHasModel('SUPER', item.id);
    return `
      <tr class="${status === 'available' ? 'is-pass' : 'is-fail'}">
        <td>
          <div class="result-model" title="${esc(item.id)}">${esc(modelName)}</div>
          <div class="result-meta">${esc(item.id)} · ${esc(kind)} · ${esc(pool)}</div>
        </td>
        <td><span class="${batchPillClass(status)}">${esc(batchStatusLabel(status))}</span></td>
        <td>${esc(batchResultText(item))}</td>
        <td>
          <div class="result-actions">
            <button type="button" class="btn btn-ghost btn-sm" data-add-alias="FREE" data-model-id="${esc(item.id)}" ${!canAdd || freeAdded ? 'disabled' : ''}>${freeAdded ? '已在 free' : '加入 free'}</button>
            <button type="button" class="btn btn-ghost btn-sm" data-add-alias="SUPER" data-model-id="${esc(item.id)}" ${!canAdd || superAdded ? 'disabled' : ''}>${superAdded ? '已在 super' : '加入 super'}</button>
          </div>
        </td>
      </tr>`;
  }).join('');
  container.innerHTML = `
    <table class="batch-result-table">
      <thead>
        <tr>
          <th>模型</th>
          <th>状态</th>
          <th>结果</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
  container.hidden = false;
  container.querySelectorAll('[data-add-alias]').forEach((button) => {
    button.addEventListener('click', () => addBatchResultToAlias(button));
  });
}

async function refreshAliasCache() {
  const payload = await apiFetch('/model-mapping');
  aliasCache = normalizeAliases(payload?.data?.aliases);
  aliasCacheLoaded = true;
  return aliasCache;
}

async function addModelToAlias(modelId, aliasName) {
  const payload = await apiFetch('/model-mapping');
  const aliases = normalizeAliases(payload?.data?.aliases);
  if ((aliases[aliasName] || []).includes(modelId)) {
    aliasCache = aliases;
    aliasCacheLoaded = true;
    return 'exists';
  }
  aliases[aliasName].push(modelId);
  await apiFetch('/model-mapping', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ models: { aliases } }),
  });
  aliasCache = normalizeAliases(aliases);
  aliasCacheLoaded = true;
  return 'added';
}

async function addBatchResultToAlias(button) {
  const modelId = button.dataset.modelId || '';
  const aliasName = button.dataset.addAlias || '';
  if (!modelId || !VIRTUAL_MODEL_ALIASES.includes(aliasName)) return;
  button.disabled = true;
  try {
    const result = await addModelToAlias(modelId, aliasName);
    window.showToast?.(result === 'exists' ? `已在 ${aliasName}` : `已加入 ${aliasName}`, 'success');
  } catch (error) {
    window.showToast?.(`加入失败：${error.message}`, 'error');
  } finally {
    renderBatchResults();
  }
}

function openBatchModal() {
  batchResults = [];
  renderBatchModels();
  refreshAliasCache().then(renderBatchResults).catch(() => {
    aliasCacheLoaded = false;
  });
  const modal = document.getElementById('batch-modal');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeBatchModal() {
  if (batchRunning) return;
  const modal = document.getElementById('batch-modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

async function scanOneModel(tokenId, modelId) {
  return apiFetch('/grok-capability/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token_id: tokenId, model: modelId }),
  });
}

async function runBatchScan() {
  const tokenId = selectedAccountId;
  const selectedModels = Array.from(batchSelection);
  if (!tokenId || !selectedModels.length) return;

  batchRunning = true;
  batchResults = [];
  updateBatchStatus();
  window.showToast?.('批量检测已开始', 'success');
  try {
    for (const modelId of selectedModels) {
      renderBatchModels(modelId);
      try {
        const report = await scanOneModel(tokenId, modelId);
        const result = report.results?.[0] || { id: modelId, status: 'unknown' };
        batchResults.push(result);
      } catch (error) {
        const model = models.find((item) => item.id === modelId) || { id: modelId };
        batchResults.push({
          id: modelId,
          name: model.name || modelId,
          kind: model.kind || 'chat',
          status: 'unknown',
          http_status: error.status || 0,
          message: error.message,
        });
      }
      renderBatchModels();
    }
    const token = accounts.find((item) => item.id === tokenId) || null;
    const available = batchResults.filter((item) => item.status === 'available').length;
    const report = {
      object: 'grok_capability_report',
      started_at: Date.now(),
      duration_ms: batchResults.reduce((sum, item) => sum + Number(item.duration_ms || 0), 0),
      token,
      summary: { total: batchResults.length, available, failed: batchResults.length - available },
      results: batchResults,
    };
    sessionStorage.setItem('grok_capability_report', JSON.stringify(report));
    window.showToast?.('批量检测完成', 'success');
  } finally {
    batchRunning = false;
    renderBatchModels();
  }
}

async function loadOptions() {
  setStatus('加载中…');
  const payload = await apiFetch('/grok-capability/options');
  accounts = payload.accounts || [];
  models = payload.models || [];
  renderAccounts();
  renderModels();
  setStatus(accounts.length && models.length ? '选择 Key 和模型后开始检测' : '没有可检测项');
}

async function runScan() {
  const tokenId = selectedAccountId;
  const modelId = document.getElementById('model-select').value;
  if (!tokenId || !modelId) return;

  const button = document.getElementById('scan-btn');
  button.disabled = true;
  setStatus('检测中…');
  window.showToast?.('检测已开始', 'success');
  try {
    const report = await scanOneModel(tokenId, modelId);
    sessionStorage.setItem('grok_capability_report', JSON.stringify(report));
    renderScanResult(report);
    setStatus('检测完成');
    window.showToast?.('检测完成', 'success');
  } catch (error) {
    renderScanResult(null);
    setStatus(`检测失败：${error.message}`);
    window.showToast?.('检测失败', 'error');
  } finally {
    button.disabled = !selectedAccountId || !models.length;
  }
}

function waitI18n() {
  return new Promise((resolve) => window.I18n?.onReady(resolve) || resolve());
}

(async () => {
  await waitI18n();
  await window.renderAdminHeader?.();
  await window.renderSiteFooter?.();

  adminAuthKey = await adminKey.get();
  if (!adminAuthKey || !await verifyKey(ADMIN_API + '/verify', adminAuthKey).catch(() => false)) {
    location.href = '/admin/login';
    return;
  }

  document.getElementById('cap-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    await runScan();
  });
  document.getElementById('reload-btn').addEventListener('click', () => loadOptions().catch((error) => {
    setStatus(`加载失败：${error.message}`);
    window.showToast?.('加载失败', 'error');
  }));
  document.getElementById('open-account-btn').addEventListener('click', openAccountModal);
  document.getElementById('account-email-filter').addEventListener('input', (event) => {
    accountEmailFilter = event.target.value || '';
    renderAccountList();
  });
  document.getElementById('account-pool-filter').addEventListener('change', (event) => {
    accountPoolFilter = event.target.value || '';
    renderAccountList();
  });
  document.querySelectorAll('[data-account-close]').forEach((node) => node.addEventListener('click', closeAccountModal));
  document.getElementById('account-modal').addEventListener('click', (event) => {
    if (event.target === event.currentTarget) closeAccountModal();
  });
  document.getElementById('open-batch-btn').addEventListener('click', openBatchModal);
  document.getElementById('select-all-batch-btn').addEventListener('click', () => {
    models.forEach((item) => batchSelection.add(item.id));
    batchResults = [];
    renderBatchModels();
  });
  document.getElementById('invert-batch-btn').addEventListener('click', () => {
    models.forEach((item) => {
      if (batchSelection.has(item.id)) batchSelection.delete(item.id);
      else batchSelection.add(item.id);
    });
    batchResults = [];
    renderBatchModels();
  });
  document.getElementById('clear-batch-btn').addEventListener('click', () => {
    batchSelection.clear();
    batchResults = [];
    renderBatchModels();
  });
  document.getElementById('start-batch-btn').addEventListener('click', runBatchScan);
  document.getElementById('batch-report-btn').addEventListener('click', () => {
    location.href = '/admin/grok-capability/report';
  });
  document.querySelectorAll('[data-batch-close]').forEach((node) => node.addEventListener('click', closeBatchModal));
  document.getElementById('batch-modal').addEventListener('click', (event) => {
    if (event.target === event.currentTarget) closeBatchModal();
  });

  try {
    await loadOptions();
  } catch (error) {
    setStatus(`加载失败：${error.message}`);
    window.showToast?.('加载失败', 'error');
  }
})();
</script>
